<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- 麦克风主体 -->
    <rect x="-28" y="-120" width="56" height="140" rx="28" fill="white" opacity="0.95"/>
    <!-- 麦克风支架 -->
    <path d="M-70 0 A70 70 0 0 0 70 0" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
    <!-- 麦克风底座线 -->
    <line x1="0" y1="20" x2="0" y2="80" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
    <!-- 底座横线 -->
    <line x1="-40" y1="80" x2="40" y2="80" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
    <!-- 反馈符号 - 右上角对话气泡 -->
    <g transform="translate(60,-80) scale(0.5)">
      <rect x="0" y="0" width="80" height="60" rx="12" fill="white" opacity="0.9"/>
      <polygon points="15,60 25,60 10,80" fill="white" opacity="0.9"/>
      <line x1="15" y1="20" x2="65" y2="20" stroke="#4F46E5" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="35" x2="50" y2="35" stroke="#4F46E5" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
