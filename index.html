<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>课堂反馈助手</title>
    <link rel="stylesheet" href="css/style.css?v=41">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6365F1">
    <meta name="color-scheme" content="light dark">
    <!-- P4-1: 非首屏脚本移到 head + defer，浏览器解析 HTML 时并行下载，解析完成后按顺序执行 -->
    <!-- defer 保证执行顺序与原 body 末尾加载一致：db → storage → models → ... → app -->
    <script defer src="js/db.js?v=4"></script>
    <script defer src="js/storage.js?v=40"></script>
    <script defer src="js/models.js?v=39"></script>
    <script defer src="js/speech/providerInterface.js?v=1"></script>
    <script defer src="js/speech/whisperProvider.js?v=6"></script>
    <script defer src="js/speech/voskProvider.js?v=4"></script>
    <script defer src="js/speech/sherpaProvider.js?v=6"></script>
    <script defer src="js/recorder.js?v=66"></script>
    <script defer src="js/ai.js?v=39"></script>
    <script defer src="js/ui.js?v=42"></script>
    <script defer src="js/components/bottomSheet.js?v=34"></script>
    <script defer src="js/pages/studentsPage.js?v=35"></script>
    <script defer src="js/pages/studentFormPage.js?v=35"></script>
    <script defer src="js/pages/subjectSelectPage.js?v=33"></script>
    <script defer src="js/pages/recordPage.js?v=44"></script>
    <script defer src="js/pages/historyPage.js?v=38"></script>
    <script defer src="js/pages/settingsPage.js?v=43"></script>
    <!-- Transformers.js：由 whisperWorker.js 在 Worker 线程内 import 加载，主线程不再加载（避免阻塞 UI） -->
    <script defer src="js/app.js?v=42"></script>
</head>
<body>
    <!-- 跳到主内容（无障碍快捷链接，键盘用户可跳过侧边栏导航） -->
    <a href="#main-content" class="skip-link">跳到主内容</a>
    <div class="desktop-layout">
        <!-- 桌面端侧边栏 -->
        <aside class="desktop-sidebar">
            <div class="sidebar-logo">📚 课堂反馈助手</div>
            <nav class="sidebar-nav" aria-label="主导航">
                <button class="sidebar-nav-item active" data-page="students" onclick="app.navigate('students')" aria-current="page">
                    <span class="nav-icon" aria-hidden="true">👥</span>
                    <span>学生管理</span>
                </button>
                <button class="sidebar-nav-item" data-page="record" onclick="app.navigate('record')">
                    <span class="nav-icon" aria-hidden="true">🎙️</span>
                    <span>课堂录音</span>
                </button>
                <button class="sidebar-nav-item" data-page="history" onclick="app.navigate('history')">
                    <span class="nav-icon" aria-hidden="true">📋</span>
                    <span>历史反馈</span>
                </button>
                <button class="sidebar-nav-item" data-page="settings" onclick="app.openSettings()">
                    <span class="nav-icon" aria-hidden="true">⚙️</span>
                    <span>系统设置</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <span>课堂反馈助手 v1.9 · 纯前端应用</span>
                <a href="tutorial.html" class="help-link" title="使用教程" aria-label="查看使用教程">❓</a>
            </div>
        </aside>

        <div class="desktop-main" id="main-content">
            <!-- 页面容器 -->
            <div id="pages-container">
                <!-- 学生列表页 -->
                <div id="students-page" class="page"></div>

                <!-- 学生表单页 -->
                <div id="student-form-page" class="page"></div>

                <!-- 科目选择页 -->
                <div id="subject-select-page" class="page"></div>

                <!-- 录音页 -->
                <div id="record-page" class="page"></div>

                <!-- 历史反馈页 -->
                <div id="history-page" class="page"></div>

                <!-- 设置页 -->
                <div id="settings-page" class="page"></div>
            </div>
        </div>
    </div>

    <!-- 底部导航（移动端） -->
    <nav class="bottom-nav" aria-label="主导航">
        <button class="bottom-nav-item active" data-page="students" onclick="app.navigate('students')" aria-current="page">
            <span class="nav-icon" aria-hidden="true">👥</span>
            <span>学生</span>
        </button>
        <button class="bottom-nav-item" data-page="record" onclick="app.navigate('record')">
            <span class="nav-icon" aria-hidden="true">🎙️</span>
            <span>录音</span>
        </button>
        <button class="bottom-nav-item" data-page="settings" onclick="app.openSettings()">
            <span class="nav-icon" aria-hidden="true">⚙️</span>
            <span>设置</span>
        </button>
    </nav>

    <!-- 反馈结果弹窗 -->
    <div id="result-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="result-modal-title">
        <div class="modal-content">
            <header>
                <h2 id="result-modal-title">📋 课堂反馈</h2>
                <button class="close-btn" aria-label="关闭">&times;</button>
            </header>
            <div class="modal-body">
                <!-- 小组模式：顶部学生标签 -->
                <div id="group-tabs-container" class="group-tabs-container" style="display:none;"></div>
                <div class="feedback-title" id="feedback-title"></div>
                <div id="feedback-content"></div>
                <!-- 小组模式：底部翻页导航 -->
                <div id="group-nav-container" class="group-nav-container" style="display:none;">
                    <button class="group-nav-btn" id="group-nav-prev">← 上一个</button>
                    <span class="group-nav-indicator" id="group-nav-indicator">1 / 3</span>
                    <button class="group-nav-btn" id="group-nav-next">下一个 →</button>
                </div>
            </div>
            <footer>
                <button id="btn-copy" class="primary-btn">📋 一键复制</button>
                <button id="btn-regenerate" class="secondary-btn">🔄 重新生成</button>
            </footer>
        </div>
    </div>

    <!-- API Key 帮助弹窗 -->
    <div id="help-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="help-modal-title">
        <div class="modal-content">
            <header>
                <h2 id="help-modal-title">如何获取 API Key</h2>
                <button class="close-btn" aria-label="关闭">&times;</button>
            </header>
            <div class="modal-body">
                <h3>方式一：DeepSeek（推荐）</h3>
                <ol>
                    <li>访问 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a></li>
                    <li>注册账号并登录</li>
                    <li>进入"API Keys"页面，点击"创建 API Key"</li>
                    <li>复制生成的 Key，粘贴到上方输入框</li>
                </ol>
                <p class="hint">新用户有免费额度，后续费用约 ¥0.003/千字</p>

                <h3>方式二：通义千问</h3>
                <ol>
                    <li>访问 <a href="https://dashscope.aliyun.com" target="_blank">dashscope.aliyun.com</a></li>
                    <li>使用阿里云账号登录</li>
                    <li>进入"API-KEY 管理"创建 Key</li>
                </ol>
            </div>
        </div>
    </div>

    <!-- 底部弹窗容器 -->
    <div id="bottom-sheet" class="bottom-sheet" role="dialog" aria-modal="true" aria-label="操作面板">
        <div class="bottom-sheet-content"></div>
    </div>

    <!-- Scripts (P4-1: 已移至 head + defer，启用并行下载) -->
    <script>
        // 注册 Service Worker 实现离线缓存
        // 使用相对路径 './sw.js'，适配 GitHub Pages 子路径部署（如 https://user.github.io/repo/）
        // 绝对路径 '/sw.js' 在子路径部署下会指向站点根，导致 404 注册失败
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then((reg) => {
                console.log('[SW] Service Worker 注册成功');
                // P3-4: 监听 SW 更新，新版本安装完成后提示用户刷新
                // 不强制刷新，避免打断录音/输入等操作
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    if (!newWorker) return;
                    newWorker.addEventListener('statechange', () => {
                        // 新 SW 已安装完成，且页面已有 controller（即非首次安装）
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // SW 中调用了 skipWaiting()，新 SW 会立即激活
                            if (typeof UI !== 'undefined' && UI.showToast) {
                                UI.showToast('应用已更新，刷新以应用新版本', 6000, 'info');
                            }
                        }
                    });
                });
            }).catch((err) => {
                console.warn('[SW] Service Worker 注册失败:', err);
            });

            // P3-5: 捕获 PWA 安装提示事件，供设置页"安装应用"按钮调用
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                window.__deferredInstallPrompt = e;
                // 通知设置页（如果已渲染）显示安装按钮
                window.dispatchEvent(new CustomEvent('pwa-installable'));
            });

            window.addEventListener('appinstalled', () => {
                window.__deferredInstallPrompt = null;
                window.dispatchEvent(new CustomEvent('pwa-installed'));
                if (typeof UI !== 'undefined' && UI.showToast) {
                    UI.showToast('已添加到主屏幕，可像原生应用一样使用', 3000, 'success');
                }
            });
        }
    </script>
</body>
</html>
